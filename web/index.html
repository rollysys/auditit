<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Audit Viewer</title>
<style>
:root {
  --bg: #1e1e1e; --fg: #d4d4d4; --bg2: #252526; --bg3: #2d2d2d;
  --border: #3c3c3c; --blue: #569cd6; --green: #6a9955;
  --yellow: #dcdcaa; --red: #f44747; --orange: #ce9178;
  --cyan: #4ec9b0; --gray: #888;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--fg); font-size: 12px; height: 100vh; overflow: hidden; }

/* Header */
.header { background: var(--bg3); border-bottom: 1px solid var(--border); padding: 4px 12px; display: flex; align-items: center; justify-content: space-between; height: 30px; flex-shrink: 0; }
.header h1 { font-size: 12px; font-weight: 600; }
.header button { background: var(--bg2); border: 1px solid var(--border); color: var(--fg); padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }
.header button:hover { background: var(--border); }
/* View tabs */
.view-tabs { display: flex; gap: 4px; margin-left: 16px; }
.view-tabs button { padding: 2px 12px; }
.view-tabs button.active { background: var(--bg); color: var(--blue); border-color: var(--blue); }

/* Memory view (shares .layout) */
.memory-project-list { width: 300px; min-width: 240px; max-width: 400px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; background: var(--bg2); }
.memory-project-list::-webkit-scrollbar { width: 6px; }
.memory-project-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.memory-project-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; cursor: pointer; border-bottom: 1px solid var(--border); }
.memory-project-item:hover { background: var(--bg3); }
.memory-project-item.active { background: var(--bg3); border-left: 2px solid var(--blue); }
.memory-project-item .proj-name { font-size: 12px; color: var(--fg); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.memory-project-item .proj-count { font-size: 10px; color: var(--gray); flex-shrink: 0; }
.memory-project-item.global .proj-name { color: var(--cyan); font-weight: 600; }
.memory-project-item .proj-cwd { font-size: 10px; color: var(--gray); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }

.memory-file-panel { flex: 1; overflow-y: auto; padding: 8px 12px; }
.memory-file-panel::-webkit-scrollbar { width: 6px; }
.memory-file-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.memory-file-row { margin-bottom: 4px; }
.memory-file-head {
  display: flex; align-items: center; gap: 8px; padding: 4px 8px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 3px;
  cursor: pointer; font-size: 11px;
}
.memory-file-head:hover { background: var(--border); }
.memory-file-head .cat-chip {
  background: var(--bg); color: var(--cyan); border: 1px solid var(--border);
  border-radius: 3px; padding: 0 5px; font-size: 9px; flex-shrink: 0;
}
.memory-file-head .cat-chip.global { color: var(--yellow); }
.memory-file-head .cat-chip.claude-md { color: var(--orange); }
.memory-file-head .cat-chip.claude-local { color: var(--green); }
.memory-file-head .cat-chip.auto-memory { color: var(--cyan); }
.memory-file-head .fpath { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--fg); font-family: monospace; }
.memory-file-head .fsize { color: var(--gray); font-size: 10px; flex-shrink: 0; }
.memory-file-head .caret { color: var(--gray); flex-shrink: 0; width: 10px; text-align: center; }
.memory-file-body {
  display: none; margin: 2px 0 8px; padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
  max-height: 60vh; overflow-y: auto;
  white-space: pre-wrap; word-break: break-word;
  font-family: monospace; font-size: 11px;
  color: var(--fg); line-height: 1.5;
}
.memory-file-body.open { display: block; }

/* Layout: left sidebar + right detail */
.layout { display: flex; height: calc(100vh - 30px); }

/* Left: session list */
.session-list { width: 320px; min-width: 260px; max-width: 400px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; background: var(--bg2); }
.session-list::-webkit-scrollbar { width: 6px; }
.session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.date-group { border-bottom: 1px solid var(--border); }
.date-group h2 { font-size: 11px; color: var(--green); padding: 4px 8px; background: var(--bg3); position: sticky; top: 0; }
.session-item { display: flex; align-items: flex-start; padding: 5px 8px; cursor: pointer; border-bottom: 1px solid transparent; gap: 6px; }
.session-item:hover { background: var(--bg3); }
.session-item.active { background: var(--bg3); border-left: 2px solid var(--blue); }
.session-item .status { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.session-item .status.active { background: var(--green); }
.session-item .status.completed { background: var(--border); }
.session-item .info { flex: 1; overflow: hidden; min-width: 0; }
/* Line 1: time + cwd basename + delete button */
.session-item .headline { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.session-item .headline .time { color: var(--gray); font-family: monospace; flex-shrink: 0; }
.session-item .headline .cwd { color: var(--cyan); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.session-item .headline .cwd.empty { color: var(--gray); font-style: italic; }
.session-item .del-btn {
  background: none; border: none; color: var(--border); cursor: pointer;
  font-size: 13px; line-height: 1; padding: 0 2px; flex-shrink: 0;
}
.session-item .del-btn:hover { color: var(--red); }
/* Sub-agent visual — indented tree branches and agent_type chip */
.session-item.is-subagent { padding-left: 0; }
.session-item .tree-bars {
  color: #555; font-family: monospace;
  font-size: 11px; white-space: pre; flex-shrink: 0; align-self: stretch;
  padding: 4px 0 0 8px;
}
.session-item .agent-chip {
  background: var(--bg3); color: var(--cyan); border: 1px solid var(--border);
  border-radius: 3px; padding: 0 4px; font-size: 9px; font-family: inherit;
  flex-shrink: 0;
}
.session-item .unclosed-chip {
  color: var(--yellow); font-size: 11px; flex-shrink: 0; cursor: help;
}
.session-item .cost-none { color: #555; }
/* Line 2: prompt (muted) */
.session-item .prompt { font-size: 11px; color: var(--gray); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
.session-item .prompt.empty { font-style: italic; color: var(--border); }
/* Line 3: metadata */
.session-item .meta { font-size: 10px; color: var(--gray); margin-top: 1px; }

/* Right: detail */
.detail-panel-wrap { flex: 1; display: none; flex-direction: column; overflow: hidden; }
.detail-panel-wrap.active { display: flex; }

/* Session info bar (compact, top of right side) */
.session-info-bar { display: flex; align-items: center; gap: 16px; padding: 4px 12px; border-bottom: 1px solid var(--border); background: var(--bg3); font-size: 11px; flex-shrink: 0; flex-wrap: wrap; }
.session-info-bar .info-item { white-space: nowrap; }
.session-info-bar .info-item label { color: var(--gray); }
.session-info-bar .info-item span { color: var(--fg); }
.session-info-bar .resume-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--fg); padding: 1px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; margin-left: auto; }
.session-info-bar .resume-btn:hover { background: var(--border); }
.session-info-bar .resume-btn.copied { background: var(--green); color: #000; border-color: var(--green); }

/* Empty state */
.empty-detail { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--gray); font-size: 12px; }

/* Event log */
.event-log { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
.event-log::-webkit-scrollbar { width: 6px; }
.event-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Event row */
.event-row { display: flex; align-items: flex-start; padding: 0 4px; border-radius: 2px; font-family: monospace; font-size: 11px; }
.event-row:hover { background: var(--bg2); }
.event-row .ts { color: var(--gray); width: 64px; flex-shrink: 0; font-size: 10px; line-height: 14px; }
.event-row .depth-bars {
  color: #666; flex-shrink: 0; line-height: 14px; font-size: 11px;
  white-space: pre; letter-spacing: 0;
}
.event-row .icon { width: 16px; flex-shrink: 0; text-align: center; line-height: 14px; font-size: 10px; }
.event-row .tool-name { width: 140px; flex-shrink: 0; color: var(--yellow); line-height: 14px; }
.event-row .status-text { flex: 1; color: var(--fg); line-height: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.event-row .actions { flex-shrink: 0; margin-left: 4px; display: flex; gap: 3px; }
/* Collapsible detail panels inherit the parent row's depth so they align */
.detail-content.depth-1 { margin-left: calc(80px + 2ch); }
.detail-content.depth-2 { margin-left: calc(80px + 4ch); }
.detail-content.depth-3 { margin-left: calc(80px + 6ch); }
.detail-content.depth-4 { margin-left: calc(80px + 8ch); }
.detail-content.depth-5 { margin-left: calc(80px + 10ch); }

/* Tool summary text: path uses per-tool color, preview stays dim */
.tool-preview    { color: #777; }
.tool-Read .tool-path       { color: #569cd6; }
.tool-Grep .tool-path       { color: #c586c0; }
.tool-Glob .tool-path       { color: #9cdcfe; }
.tool-Bash .tool-path       { color: #6a9955; }
.tool-Edit .tool-path       { color: #d7ba7d; }
.tool-Write .tool-path      { color: #ce9178; }
.tool-Task .tool-path       { color: #4ec9b0; }
.tool-NotebookEdit .tool-path { color: #569cd6; }
.tool-WebFetch .tool-path   { color: #42a5f5; }
.tool-WebSearch .tool-path  { color: #26a69a; }
.tool-AskUserQuestion .tool-path { color: #ff7043; }

/* Tool call / result */
.tool-call .tool-name { color: var(--yellow); }
.tool-result { opacity: 0.6; }
.tool-result .tool-name { color: var(--cyan); }
.tool-result.error .status-text { color: var(--red); }

/* Special events */
.event-row.session-start { color: var(--cyan); }
.event-row.user-prompt { background: rgba(214, 153, 92, 0.18); border-left: 3px solid var(--orange); margin: 3px 0; padding-top: 2px; padding-bottom: 2px; }
.event-row.user-prompt .status-text { color: var(--orange); font-weight: 600; }
.event-row.user-prompt .tool-name { color: var(--orange); font-weight: 600; }
.event-row.stop-msg { color: var(--green); border-top: 1px solid var(--border); margin-top: 4px; padding-top: 4px; }
.event-row.session-end { color: var(--green); border-top: 1px solid var(--border); margin-top: 6px; padding-top: 6px; }
.event-row.subagent-start { color: var(--cyan); }
.event-row.subagent-stop { color: var(--cyan); border-top: 1px solid var(--border); margin-top: 2px; padding-top: 2px; }
.event-row.task-event { color: var(--orange); }
.event-row.notification-event { color: var(--gray); }
.event-row.perm-event { color: var(--yellow); }
.event-row.perm-denied-event { color: var(--red); }
.event-row.stop-fail-event { color: var(--red); border-top: 1px solid var(--border); }
.event-row.instructions-event { color: var(--gray); }
.event-row.config-event { color: var(--gray); }
.event-row.cwd-event { color: var(--gray); }
.event-row.worktree-event { color: var(--green); }
.event-row.compact-event { color: var(--gray); }
.event-row.mcp-event { color: var(--cyan); }

/* Expand button */
.expand-btn {
  background: none; border: 1px solid var(--border); color: var(--blue);
  padding: 0 4px; border-radius: 2px; cursor: pointer; font-size: 9px;
  font-family: inherit; line-height: 14px; white-space: nowrap;
}
.expand-btn:hover { background: var(--border); color: var(--fg); }

/* Collapsible detail panel */
.detail-content {
  display: none; margin: 2px 0 4px 80px; padding: 6px 10px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 3px;
  font-size: 10px; line-height: 1.5; max-height: 300px; overflow-y: auto;
  white-space: pre-wrap; word-break: break-all;
}
.detail-content.open { display: block; }
.detail-content.input-panel { color: var(--gray); }
.detail-content.result-panel { color: var(--fg); }
.detail-content.error-panel { color: var(--red); }

/* Loading */
.loading { text-align: center; padding: 30px; color: var(--gray); }

/* Prompt text in info bar */
.prompt-bar { width: 100%; font-size: 11px; color: var(--orange); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-top: 2px; }

/* Session ID display */
.session-id { font-family: monospace; font-size: 10px; user-select: all; }
.copy-id-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--gray); padding: 1px 6px; border-radius: 3px; cursor: pointer; font-size: 10px; margin-left: 4px; }
.copy-id-btn:hover { background: var(--border); color: var(--fg); }
.copy-id-btn.copied { background: var(--green); color: #000; border-color: var(--green); }
.copy-audit-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--fg); padding: 2px 10px; border-radius: 3px; cursor: pointer; font-size: 10px; }
.copy-audit-btn:hover { background: var(--border); }
.copy-audit-btn.copied { background: var(--green); color: #000; border-color: var(--green); }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px">
    <h1>Claude Audit Viewer</h1>
    <div class="view-tabs">
      <button id="tabSessions" class="active" onclick="switchView('sessions')">Sessions</button>
      <button id="tabMemory" onclick="switchView('memory')">Memory</button>
    </div>
  </div>
  <div>
    <button id="refreshBtn" onclick="refreshCurrentView()">↻ Refresh</button>
  </div>
</div>

<!-- Sessions view -->
<div class="layout" id="sessionsView">
  <!-- Left: Session list -->
  <div class="session-list" id="sessionList"></div>

  <!-- Right: Detail -->
  <div class="detail-panel-wrap" id="detailWrap">
    <div class="session-info-bar" id="infoBar"></div>
    <div class="event-log" id="eventLog">
      <div class="empty-detail">← Select a session</div>
    </div>
  </div>

  <!-- Right: Empty state (no session selected) -->
  <div class="detail-panel-wrap" id="emptyWrap" style="display:flex">
    <div class="empty-detail">← Select a session</div>
  </div>
</div>

<!-- Memory view -->
<div class="layout" id="memoryView" style="display:none">
  <div class="memory-project-list" id="memoryProjectList"></div>
  <div class="memory-file-panel" id="memoryFilePanel">
    <div class="empty-detail">← Select a project</div>
  </div>
</div>

<script>
let currentStream = null;
let allSessions = {};
let activeSessionId = null;
let pendingToolCalls = {};
// Stack of active sub-agents for the current session. Each element is
// {agent_type, start_ts} pushed on SubagentStart and popped on SubagentStop.
// Stack depth is the current nesting level for all in-between events.
let subagentStack = [];

// ========== Session List ==========
async function loadSessions() {
  const res = await fetch('/api/sessions');
  allSessions = await res.json();
  renderList();
}

function _basename(p) {
  if (!p) return '';
  const clean = p.replace(/\/+$/, '');
  const idx = clean.lastIndexOf('/');
  return idx >= 0 ? clean.substring(idx + 1) : clean;
}

function _hhmm(iso) {
  if (!iso) return '--:--';
  const d = new Date(iso);
  if (isNaN(d)) return '--:--';
  return d.toLocaleTimeString('en-GB', { hour12: false, hour: '2-digit', minute: '2-digit' });
}

function _shortModel(m) {
  if (!m) return '';
  // claude-haiku-4-5-20251001 → haiku-4-5
  return m.replace(/^claude-/, '').replace(/-\d{8}$/, '');
}

function _buildTree(sessions) {
  // Group sub-agents under their immediate parent_session_id while keeping
  // top-level (is_subagent=false) sessions as roots. Returns a flat list
  // in render order: each root followed by its descendants (DFS) each
  // tagged with the depth to use for indentation.
  const byName = new Map();
  for (const s of sessions) byName.set(s.id, s);
  const children = new Map();   // parent_id -> [child, child, ...]
  const roots = [];
  for (const s of sessions) {
    if (s.is_subagent && s.parent_session_id && byName.has(s.parent_session_id)) {
      if (!children.has(s.parent_session_id)) children.set(s.parent_session_id, []);
      children.get(s.parent_session_id).push(s);
    } else {
      roots.push(s);
    }
  }
  // Sort sub-agents within each parent by start time (ascending).
  for (const list of children.values()) {
    list.sort((a, b) => (a.started_at || '').localeCompare(b.started_at || ''));
  }
  // DFS flatten. depth is relative to the date group: 0 for root sessions,
  // 1 for their direct children, 2 for grandchildren, etc.
  const flat = [];
  const walk = (s, depth) => {
    flat.push({ s, depth });
    const kids = children.get(s.id) || [];
    for (const k of kids) walk(k, depth + 1);
  };
  for (const r of roots) walk(r, 0);
  return flat;
}

function renderList() {
  const el = document.getElementById('sessionList');
  let html = '';
  for (const [date, sessions] of Object.entries(allSessions)) {
    html += `<div class="date-group"><h2>${date}</h2>`;
    for (const { s, depth } of _buildTree(sessions)) {
      const costStr = (s.cost == null)
        ? '<span class="cost-none">—</span>'
        : (s.cost ? `$${s.cost.toFixed(3)}` : '');
      const turns = s.turns ? `${s.turns}t` : '';
      const dur = s.duration_ms ? `${(s.duration_ms/1000).toFixed(0)}s` : '';
      const modelPart = s.is_subagent ? '' : _shortModel(s.model);
      const metaParts = [modelPart, turns, dur].filter(Boolean);
      // Meta (with cost as a raw-HTML piece) joined via span separators
      const metaHtml = metaParts.map(esc).concat(costStr ? [costStr] : []).join(' · ');
      const statusClass = s.status === 'active' ? 'active' : 'completed';
      const isActive = s.id === activeSessionId ? ' active' : '';
      const subClass = s.is_subagent ? ' is-subagent' : '';
      const time = _hhmm(s.started_at);
      const cwdBase = _basename(s.cwd) || '~';
      const cwdClass = s.cwd ? 'cwd' : 'cwd empty';
      const promptText = s.prompt || '';
      const promptClass = promptText ? 'prompt' : 'prompt empty';
      const promptDisplay = promptText || '<no prompt>';
      // Tree-branch prefix for indented sub-agents.
      const treeBars = depth > 0 ? '  '.repeat(depth - 1) + '└─' : '';
      const chipHtml = (s.is_subagent && s.agent_type)
        ? `<span class="agent-chip">${esc(s.agent_type)}</span>`
        : '';
      // ⚠ marker for sub-agents whose SubagentStop never arrived (Claude
      // Code sometimes skips it). reason comes from summary.json.
      const unclosedHtml = (s.is_subagent && s.reason && s.reason !== 'normal')
        ? `<span class="unclosed-chip" title="Sub-agent closed without a matching SubagentStop (${esc(s.reason)})">⚠</span>`
        : '';
      html += `<div class="session-item${isActive}${subClass}" onclick="openSession('${s.date}','${s.id}')">
        ${treeBars ? `<span class="tree-bars">${treeBars}</span>` : ''}
        <span class="status ${statusClass}"></span>
        <div class="info">
          <div class="headline">
            <span class="time">${esc(time)}</span>
            ${chipHtml}
            ${unclosedHtml}
            <span class="${cwdClass}" title="${esc(s.cwd || '')}">${esc(cwdBase)}</span>
            <button class="del-btn" title="Delete session" onclick="deleteSession(event, '${s.date}','${s.id}')">✕</button>
          </div>
          <div class="${promptClass}" title="${esc(promptText)}">${esc(promptDisplay)}</div>
          <div class="meta">${metaHtml}</div>
        </div>
      </div>`;
    }
    html += '</div>';
  }
  el.innerHTML = html || '<div class="loading">No sessions found</div>';
}

async function deleteSession(ev, date, sessionId) {
  ev.stopPropagation();  // don't open the session
  if (!confirm(`Delete session ${sessionId.substring(0,8)}? This cannot be undone.`)) return;

  try {
    const res = await fetch(`/api/sessions/${date}/${encodeURIComponent(sessionId)}`, { method: 'DELETE' });
    if (res.status === 204) {
      // Remove from local state and re-render
      for (const [d, ss] of Object.entries(allSessions)) {
        const idx = ss.findIndex(s => s.id === sessionId && s.date === date);
        if (idx >= 0) {
          ss.splice(idx, 1);
          if (!ss.length) delete allSessions[d];
          break;
        }
      }
      if (activeSessionId === sessionId) {
        activeSessionId = null;
        document.getElementById('detailWrap').classList.remove('active');
        document.getElementById('emptyWrap').style.display = 'flex';
      }
      renderList();
    } else if (res.status === 409) {
      const body = await res.json().catch(() => ({}));
      alert(`Cannot delete: ${body.error || 'session is still active'}.\n${body.hint || ''}`);
    } else if (res.status === 404) {
      alert('Session not found on disk. Refreshing list.');
      loadSessions();
    } else {
      const body = await res.json().catch(() => ({}));
      alert(`Delete failed (HTTP ${res.status}): ${body.error || 'unknown error'}`);
    }
  } catch (e) {
    alert(`Delete failed: ${e}`);
  }
}

// ========== Detail View ==========
function openSession(date, sessionId) {
  activeSessionId = sessionId;
  renderList();

  // Switch to detail view
  document.getElementById('detailWrap').classList.add('active');
  document.getElementById('emptyWrap').style.display = 'none';

  pendingToolCalls = {};
  subagentStack = [];
  const log = document.getElementById('eventLog');
  log.innerHTML = '<div class="loading">Loading...</div>';

  loadMeta(date, sessionId);
  loadEvents(date, sessionId);
}

function _fmtCtx(s) {
  // Build the "Ctx: 38% (76k/1M)" cell with a color-coded inline style.
  // Green < 70%, yellow 70-85%, red >= 85%. Returns null if the session
  // has no ctx data (very old or not-yet-ended sessions).
  const peak = s.ctx_peak_tokens;
  const window = s.ctx_window;
  const pct = s.ctx_peak_pct;
  if (peak == null || window == null || pct == null || peak === 0) return null;
  const kPeak = peak >= 1_000_000 ? (peak / 1_000_000).toFixed(2) + 'M'
              : peak >= 1_000      ? (peak / 1_000).toFixed(0) + 'k'
                                   : String(peak);
  const kWindow = window >= 1_000_000 ? (window / 1_000_000).toFixed(0) + 'M'
                                       : (window / 1_000).toFixed(0) + 'k';
  const pctDisplay = (pct * 100).toFixed(0) + '%';
  const color = pct >= 0.85 ? 'var(--red)'
              : pct >= 0.70 ? 'var(--yellow)'
                            : 'var(--green)';
  return `<span style="color:${color};font-weight:600">${pctDisplay}</span> <span style="color:var(--gray)">(${kPeak}/${kWindow})</span>`;
}

// ========== Events (SSE) ==========
function loadEvents(date, sessionId) {
  if (currentStream) { currentStream.close(); currentStream = null; }
  const log = document.getElementById('eventLog');

  fetch(`/api/sessions/${date}/${encodeURIComponent(sessionId)}/events`)
    .then(r => r.json())
    .then(events => {
      log.innerHTML = '';
      pendingToolCalls = {};
      subagentStack = [];
      events.forEach(e => processEvent(e, log));
    })
    .catch(() => { log.innerHTML = '<div class="loading">Failed to load</div>'; });

  const evtSource = new EventSource(`/api/sessions/${date}/${encodeURIComponent(sessionId)}/stream`);
  currentStream = evtSource;

  evtSource.addEventListener('event', (e) => {
    if (e.data === '__DONE__' || e.data === '__GZ__') {
      evtSource.close(); currentStream = null;
      return;
    }
    try {
      processEvent(JSON.parse(e.data), log);
      log.scrollTop = log.scrollHeight;
    } catch {}
  });
  evtSource.onerror = () => { evtSource.close(); currentStream = null; };
}

function processEvent(event, container) {
  const ev = event.event;
  const d = event.data || {};
  const ts = event.ts ? formatLocalTime(event.ts) : '';

  switch (ev) {
    case 'PreToolUse':          renderToolCall(ts, d, container); break;
    case 'PostToolUse':
    case 'PostToolUseFailure':  renderToolResult(ts, d, ev === 'PostToolUseFailure', container); break;
    case 'SessionStart':        renderSessionStart(ts, d, container); break;
    case 'UserPromptSubmit':    renderUserPrompt(ts, d, container); break;
    case 'PermissionRequest':   renderPermissionRequest(ts, d, container); break;
    case 'PermissionDenied':    renderPermissionDenied(ts, d, container); break;
    case 'Stop':                renderStop(ts, d, container); break;
    case 'StopFailure':         renderStopFailure(ts, d, container); break;
    case 'SessionEnd':          renderSessionEnd(ts, d, container); break;
    case 'SubagentStart':       renderSubagentStart(ts, d, container); break;
    case 'SubagentStop':        renderSubagentStop(ts, d, container); break;
    case 'TaskCreated':         renderTaskCreated(ts, d, container); break;
    case 'TaskCompleted':       renderTaskCompleted(ts, d, container); break;
    case 'Notification':        renderNotification(ts, d, container); break;
    case 'InstructionsLoaded':  renderInstructionsLoaded(ts, d, container); break;
    case 'ConfigChange':        renderConfigChange(ts, d, container); break;
    case 'CwdChanged':          renderCwdChanged(ts, d, container); break;
    case 'WorktreeCreate':      renderWorktreeCreate(ts, d, container); break;
    case 'WorktreeRemove':      renderWorktreeRemove(ts, d, container); break;
    case 'PreCompact':          renderPreCompact(ts, d, container); break;
    case 'PostCompact':         renderPostCompact(ts, d, container); break;
    case 'Elicitation':         renderElicitation(ts, d, container); break;
    case 'ElicitationResult':   renderElicitationResult(ts, d, container); break;
  }
}

function renderSessionStart(ts, d, container) {

function renderUserPrompt(ts, d, container) {

function renderToolCall(ts, d, container) {
  const toolName = d.tool_name || '?';
  const toolUseId = d.tool_use_id || '';
  const input = d.tool_input ? JSON.stringify(d.tool_input, null, 2) : '';

  const row = makeRow(ts, '🔧', toolName, '', 'tool-call');
  row.classList.add('tool-' + toolName);

  // Expand button for input
  const actions = row.querySelector('.actions');
  const inputPanel = document.createElement('div');
  inputPanel.className = 'detail-content input-panel';
  inputPanel.textContent = input;

  const btn = document.createElement('button');
  btn.className = 'expand-btn';
  btn.textContent = 'input';
  btn.onclick = () => {

    btn.textContent = open ? 'hide' : 'input';
  };
  actions.appendChild(btn);

  container.appendChild(row);
  container.appendChild(inputPanel);

  if (toolUseId) {
    pendingToolCalls[toolUseId] = { row, input, inputPanel, inputBtn: btn };
  }
}

// ========== Tool result summary ==========
function toolSummary(toolName, input, response, isError) {
  if (isError) {
    const err = typeof response === 'string' ? response.substring(0, 120) : JSON.stringify(response).substring(0, 120);
    return `error: ${esc(err)}`;
  }

  const respStr = typeof response === 'string' ? response : JSON.stringify(response, null, 2);

  switch (toolName) {
    case 'Read': {
      const path = (input?.file_path || input?.path || '');
      const lines = (input?.offset != null) ? ` (L${input.offset+1}-)` : '';
      const preview = respStr.substring(0, 150);
      return `<span class="tool-path">${esc(path)}${lines}</span> → <span class="tool-preview">${esc(preview)}</span>`;
    }
    case 'Grep': {
      const pattern = input?.pattern || '';
      const path = input?.path || '';
      const firstLine = respStr.split('\n').find(l => l.trim()) || '';
      return `<span class="tool-path">pattern: ${esc(pattern)} ${esc(path)}</span> → <span class="tool-preview">${esc(firstLine.substring(0, 120))}</span>`;
    }
    case 'Glob': {
      const pattern = input?.pattern || '';
      const count = respStr.split('\n').filter(l => l.trim()).length;
      const firstFile = respStr.split('\n').find(l => l.trim()) || '';
      return `<span class="tool-path">${count} files matching ${esc(pattern)}</span> → <span class="tool-preview">${esc(firstFile.substring(0, 100))}</span>`;
    }
    case 'Bash': {
      const cmd = input?.command || '';
      const preview = respStr.substring(0, 120);
      return `<span class="tool-path">$ ${esc(cmd)}</span> → <span class="tool-preview">${esc(preview)}</span>`;
    }
    case 'Edit': {
      const path = input?.file_path || input?.path || '';
      const preview = respStr.substring(0, 120);
      return `<span class="tool-path">${esc(path)}</span> → <span class="tool-preview">${esc(preview)}</span>`;
    }
    case 'Write': {
      const path = input?.file_path || input?.path || '';
      return `<span class="tool-path">${esc(path)}</span> <span class="tool-preview">(${respStr.length.toLocaleString()} bytes)</span>`;
    }
    case 'Task':
    case 'SubagentStart':
    case 'SubagentStop': {
      const preview = respStr.substring(0, 120);
      return preview ? `<span class="tool-preview">${esc(preview)}</span>` : '';
    }
    default: {
      const preview = respStr.substring(0, 120);
      return preview ? `<span class="tool-preview">${esc(preview)}</span>` : `${respStr.length.toLocaleString()} chars`;
    }
  }
}

function renderToolResult(ts, d, isError, container) {
  const toolName = d.tool_name || '?';
  const toolUseId = d.tool_use_id || '';
  const pending = pendingToolCalls[toolUseId] || null;

  const response = d.tool_response !== undefined ? d.tool_response : (d.error || '');
  const respStr = typeof response === 'string' ? response : JSON.stringify(response, null, 2);

  // Generate summary text
  const summaryHtml = toolSummary(toolName, pending?.input ? JSON.parse(pending.input) : d.tool_input || {}, response, isError);

  if (pending) {
    // Update the existing tool call row — no new row
    pending.row.className = 'event-row tool-result tool-' + toolName + (isError ? ' error' : '');
    pending.row.querySelector('.icon').textContent = isError ? '❌' : '✔';
    pending.row.querySelector('.tool-name').style.color = isError ? 'var(--red)' : 'var(--yellow)';
    pending.row.querySelector('.status-text').innerHTML = summaryHtml;
    pending.row.querySelector('.status-text').style.color = isError ? 'var(--red)' : 'var(--fg)';
    pending.row.querySelector('.status-text').style.whiteSpace = 'normal';

    // Replace 'input' button with 'full' button
    const actions = pending.row.querySelector('.actions');
    actions.innerHTML = '';

    const resultPanel = document.createElement('div');
    resultPanel.className = 'detail-content' + (isError ? ' error-panel' : ' result-panel');
    resultPanel.textContent = respStr;

    const rbtn = document.createElement('button');
    rbtn.className = 'expand-btn';
    rbtn.textContent = 'full';
    rbtn.onclick = () => {
      const open = resultPanel.classList.toggle('open');
      rbtn.textContent = open ? 'hide' : 'full';
    };
    actions.appendChild(rbtn);

    // Insert result panel after the row
    pending.row.after(resultPanel);

    delete pendingToolCalls[toolUseId];
  } else {
    // No matching pending call — standalone result
    const resultRow = makeRow(ts, isError ? '❌' : '✔', toolName, summaryHtml, 'tool-result tool-' + toolName + (isError ? ' error' : ''));
    resultRow.style.opacity = '0.5';
    resultRow.querySelector('.status-text').style.whiteSpace = 'normal';

    const resultPanel = document.createElement('div');
    resultPanel.className = 'detail-content' + (isError ? ' error-panel' : ' result-panel');
    resultPanel.textContent = respStr;

    const rbtn = document.createElement('button');
    rbtn.className = 'expand-btn';
    rbtn.textContent = 'full';
    rbtn.onclick = () => resultPanel.classList.toggle('open');
    resultRow.querySelector('.actions').appendChild(rbtn);

    container.appendChild(resultRow);
    container.appendChild(resultPanel);
  }
}

function renderSubagentStart(ts, d, container) {
  // Rendered at the CURRENT depth (the parent's level) with a ┌ tree
  // marker in the depth-bars column (NOT in .icon, which is fixed 16px

  // so subsequent events indent one more level.
  const agentType = d.agent_type || d.tool_name || 'agent';
  const agentId = (d.agent_id || '').substring(0, 8);
  const desc = d.description || d.prompt || '';
  const label = agentId ? `${agentType} ${agentId}` : agentType;
  const text = desc ? `${esc(label)} — ${esc(desc.substring(0, 140))}` : esc(label);
  const row = makeRow(ts, '🤖', 'AGENT', text, 'subagent-start', text, '┌ ');
  container.append(row);
  subagentStack.push({ agent_type: agentType, agent_id: d.agent_id || '', start_ts: ts });
}

function renderSubagentStop(ts, d, container) {

  const agentType = d.agent_type || d.tool_name || 'agent';

  const msg = (d.last_assistant_message || d.reason || '').substring(0, 150);
  container.append(makeRow(ts, '🤖', 'AGENT DONE', `${esc(agentType)} — ${esc(msg)}`, 'subagent-stop', msg, '└ '));

function _depthBars(depth, trailer) {
  // Render `depth` vertical bars + optional trailing tree marker as the
  // indent prefix. Each bar/marker is 2 chars wide so alignment stays
  // monospace. depth=0 with no trailer → empty string.
  const base = depth > 0 ? '│ '.repeat(depth) : '';
  if (trailer) return base + trailer;
  return base;
}

function makeRow(ts, icon, toolName, statusText, cls, title, trailerChar) {
  const row = document.createElement('div');
  row.className = 'event-row ' + cls;
  // Read depth from the live subagent stack so every renderer picks up
  // indentation for free — no per-renderer changes needed. `trailerChar`
  // is an optional extra bar-column glyph (e.g. ┌ / └) that keeps the
  // wide bracket characters out of the fixed-width .icon cell.
  const depth = subagentStack.length;
  const bars = _depthBars(depth, trailerChar || '');
  row.innerHTML = `
    <span class="ts">${ts}</span>
    <span class="depth-bars">${bars}</span>
    <span class="icon">${icon}</span>
    <span class="tool-name">${esc(toolName)}</span>
    <span class="status-text">${statusText}</span>
    <span class="actions"></span>
  `;
  if (depth > 0) row.dataset.depth = depth;
  if (title) row.querySelector('.status-text').title = title;
  return row;
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function formatLocalTime(isoTs) {
  // Convert "2026-04-11T08:23:48Z" → "16:23:48" (local timezone)
  const d = new Date(isoTs);
  return d.toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ========== View switching ==========
let currentView = 'sessions';
let memoryData = null;
let activeMemoryEncoded = null;

function switchView(view) {
  currentView = view;
  document.getElementById('sessionsView').style.display = (view === 'sessions') ? 'flex' : 'none';
  document.getElementById('memoryView').style.display  = (view === 'memory')   ? 'flex' : 'none';
  document.getElementById('tabSessions').classList.toggle('active', view === 'sessions');
  document.getElementById('tabMemory').classList.toggle('active', view === 'memory');
  if (view === 'memory' && !memoryData) {
    loadMemoryIndex();
  }
}

function refreshCurrentView() {
  if (currentView === 'sessions') {
    loadSessions();
  } else {
    loadMemoryIndex();
  }
}

// ========== Memory view ==========
async function loadMemoryIndex() {
  const panel = document.getElementById('memoryFilePanel');
  panel.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const res = await fetch('/api/memory');
    memoryData = await res.json();
  } catch (e) {
    document.getElementById('memoryProjectList').innerHTML =
      '<div class="loading">Failed to load memory index</div>';
    return;
  }
  renderMemoryProjects();
  // Auto-open the most recent project (or global) on first load
  if (memoryData.projects.length > 0 && !activeMemoryEncoded) {
    openMemoryProject(memoryData.projects[0].encoded);
  } else if (memoryData.global && !activeMemoryEncoded) {
    openMemoryProject('__global__');
  }
}

// Attribute-safe escaping for values placed inside HTML attributes via
// innerHTML templates. Extends esc() by also escaping quote characters
// (' and "). Critical for any data-* attribute holding user-controlled
// strings like file paths or project dir names.
function escAttr(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderMemoryProjects() {
  const el = document.getElementById('memoryProjectList');
  if (!memoryData) { el.innerHTML = ''; return; }
  let html = '';
  if (memoryData.global) {
    const activeCls = activeMemoryEncoded === '__global__' ? ' active' : '';
    html += `<div class="memory-project-item global${activeCls}" data-encoded="__global__">
      <div style="flex:1;min-width:0">
        <div class="proj-name">⌂ Global</div>
        <span class="proj-cwd">${esc(memoryData.global.file_path)}</span>
      </div>
      <div class="proj-count">1</div>
    </div>`;
  }
  for (const p of memoryData.projects) {
    const activeCls = p.encoded === activeMemoryEncoded ? ' active' : '';
    html += `<div class="memory-project-item${activeCls}" data-encoded="${escAttr(p.encoded)}">
      <div style="flex:1;min-width:0">
        <div class="proj-name" title="${escAttr(p.cwd)}">${esc(p.name)}</div>
        <span class="proj-cwd">${esc(p.cwd)}</span>
      </div>
      <div class="proj-count">${p.files.length}</div>
    </div>`;
  }
  el.innerHTML = html || '<div class="loading">No memory files found</div>';
}

// Event delegation: one listener on the container reads data-encoded.
// Installed once on first use to avoid leaking per-render listeners.
document.addEventListener('DOMContentLoaded', () => {
  const list = document.getElementById('memoryProjectList');
  if (list) {
    list.addEventListener('click', (ev) => {
      const item = ev.target.closest('.memory-project-item');
      if (!item) return;
      const encoded = item.dataset.encoded;
      if (encoded) openMemoryProject(encoded);
    });
  }
  const panel = document.getElementById('memoryFilePanel');
  if (panel) {
    panel.addEventListener('click', (ev) => {
      const head = ev.target.closest('.memory-file-head');
      if (!head) return;
      const encodedPath = head.dataset.path;
      if (encodedPath) toggleMemoryFile(head, encodedPath);
    });
  }
});

function openMemoryProject(encoded) {
  activeMemoryEncoded = encoded;
  renderMemoryProjects();
  const panel = document.getElementById('memoryFilePanel');
  let files = [];
  if (encoded === '__global__') {
    if (memoryData.global) files = [memoryData.global];
  } else {
    const proj = memoryData.projects.find(p => p.encoded === encoded);
    if (proj) files = proj.files;
  }
  if (!files.length) {
    panel.innerHTML = '<div class="empty-detail">(no files)</div>';
    return;
  }
  let html = '';
  for (const f of files) {
    const catClass = f.category === 'global' ? 'global'
                  : f.category === 'CLAUDE.md' ? 'claude-md'
                  : f.category === '.claude/CLAUDE.md' ? 'claude-local'
                  : f.category === 'auto-memory' ? 'auto-memory' : '';
    const size = f.size < 1024 ? `${f.size}B` : `${(f.size/1024).toFixed(1)}K`;
    const encodedPath = encodeURIComponent(f.file_path);
    html += `<div class="memory-file-row">
      <div class="memory-file-head" data-path="${escAttr(encodedPath)}">
        <span class="caret">▶</span>
        <span class="cat-chip ${catClass}">${esc(f.category)}</span>
        <span class="fpath">${esc(f.file_path)}</span>
        <span class="fsize">${size}</span>
      </div>
      <div class="memory-file-body"></div>
    </div>`;
  }
  panel.innerHTML = html;
}

async function toggleMemoryFile(headEl, encodedPath) {
  const body = headEl.nextElementSibling;
  const caret = headEl.querySelector('.caret');
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    caret.textContent = '▶';
    return;
  }
  if (!body.dataset.loaded) {
    body.textContent = 'Loading...';
    try {
      const res = await fetch(`/api/memory/file?path=${encodedPath}`);
      if (!res.ok) {
        body.textContent = `Failed to load (HTTP ${res.status})`;
      } else {
        body.textContent = await res.text();
        body.dataset.loaded = '1';
      }
    } catch (e) {
      body.textContent = `Error: ${e}`;
    }
  }
  body.classList.add('open');
  caret.textContent = '▼';
}

// ========== Init ==========
loadSessions();
</script>
